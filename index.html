<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الاختبار البرمجية الشاملة</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial;
}

body{
    background:#f2f4f8;
}

.topbar{
    background:#0b2347;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.topbar .title{
    font-size:24px;
    font-weight:bold;
}

.topbar .info{
    display:flex;
    gap:15px;
    align-items:center;
    flex-wrap:wrap;
}

.btn{
    background:#1f4fa3;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition: 0.3s;
}

.btn-finish { background: #d9534f; }
.btn:hover{ opacity:0.8; transform: translateY(-2px); }

.container{
    display:flex;
    height:calc(100vh - 80px);
}

.sidebar{
    width:25%;
    background:#ffffff;
    padding:20px;
    overflow-y:auto;
    border-left:2px solid #ddd;
}

.sidebar h2{
    margin-bottom:20px;
    font-size: 1.1rem;
    color: #333;
}

.question-item{
    background:#f7f7f7;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
    display: flex;
    justify-content: space-between;
}

.question-item.answered {
    background: #e8f5e9;
    border-color: #4caf50;
}

.question-item.active{
    border-color:#1f4fa3;
    background:#e6edff;
}

.content{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

.question-box{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.question-title{
    font-size:19px;
    margin-bottom:20px;
    line-height:1.7;
    color: #2c3e50;
}

.code-box{
    background:#1e1e1e;
    color: #dcdcdc;
    padding:20px;
    border-radius:10px;
    overflow:auto;
    margin-bottom:20px;
    direction:ltr;
    text-align:left;
    font-family:'Consolas', 'Monaco', monospace;
    border-left:5px solid #1f4fa3;
    white-space:pre-wrap;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.answer{
    background:#f9f9f9;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
    border:2px solid #eee;
    direction:ltr;
    text-align:left;
}

.answer:hover{
    background:#f0f4ff;
    border-color: #1f4fa3;
}

.answer.selected{
    border-color:#1f4fa3;
    background:#dfe9ff;
    font-weight: bold;
}

.note-box {
    background: #fff3cd;
    border-right: 5px solid #ffc107;
    padding: 10px;
    margin-bottom: 15px;
    font-size: 14px;
    border-radius: 4px;
}

@media(max-width:900px){
    .container{ flex-direction:column; }
    .sidebar{ width:100%; height:180px; border-left:none; border-top:2px solid #ddd; }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="title">اختبار البرمجة الذكي</div>
    <div class="info">
        <span>السؤال: <span id="currentQuestionNum">1</span> / <span id="totalQuestionsNum">19</span></span>
        <span>الوقت: <span id="timer">30:00</span></span>
        <button class="btn" onclick="nextQuestion()">السؤال التالي</button>
        <button class="btn btn-finish" onclick="finishExam()">إنهاء وإظهار النتيجة</button>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <h2>قائمة الأسئلة</h2>

    </div>

            <div class="question-title" id="questionText"></div>
            <pre class="code-box" id="codeBox"></pre>
            <div class="answers" id="answersBox"></div>
