
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الاختبار</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial;
}

body{
    background:#f2f4f8;
}

/* الشريط العلوي */
.topbar{
    background:#0b2347;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.topbar .title{
    font-size:24px;
    font-weight:bold;
}

.topbar .info{
    display:flex;
    gap:15px;
    align-items:center;
}

.btn{
    background:#1f4fa3;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    opacity:0.9;
}

/* تقسيم الصفحة */
.container{
    display:flex;
    height:calc(100vh - 80px);
}

/* قائمة الأسئلة */
.sidebar{
    width:35%;
    background:#ffffff;
    padding:20px;
    overflow-y:auto;
    border-left:2px solid #ddd;
}

.sidebar h2{
    margin-bottom:20px;
}

.question-item{
    background:#f7f7f7;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
}

.question-item:hover{
    background:#e9eefc;
}

.question-item.active{
    border-color:#1f4fa3;
    background:#e6edff;
}

/* منطقة السؤال */
.content{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

.question-box{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.question-title{
    font-size:24px;
    margin-bottom:20px;
}

.code-box{
    background:#f4f4f4;
    padding:20px;
    border-radius:10px;
    overflow:auto;
    margin-bottom:20px;
    direction:ltr;
    text-align:left;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.answer{
    background:#f7f7f7;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
}

.answer:hover{
    background:#eef3ff;
}

.answer.selected{
    border-color:#1f4fa3;
    background:#dfe9ff;
}

/* موبايل */
@media(max-width:900px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
    height:250px;
    border-left:none;
    border-top:2px solid #ddd;
}

}
</style>

</head>
<body>

<!-- الشريط العلوي -->
<div class="topbar">

    <div class="title">
        منصة الاختبار
    </div>

    <div class="info">
        <span>السؤال: <span id="currentQuestion">1</span></span>
        <span>الوقت: <span id="timer">30:00</span></span>

        <button class="btn" onclick="nextQuestion()">
            التالي
        </button>

        <button class="btn" onclick="finishExam()">
            إنهاء الاختبار
        </button>
    </div>

</div>

<div class="container">

    <!-- قائمة الأسئلة -->
    <div class="sidebar">

        <h2>قائمة الأسئلة</h2>

        <div id="questionsList"></div>

    </div>

    <!-- السؤال -->
    <div class="content">

        <div class="question-box">

            <div class="question-title" id="questionText"></div>

            <pre class="code-box" id="codeBox"></pre>

            <div class="answers" id="answersBox"></div>

        </div>

    </div>

</div>


<script>

const questions = [

{
    question: "حدد النتيجة التي سيتم إخراجها عند تنفيذ هذا البرنامج",

    code:
`let today = "الأربعاء";
let specialSalesDay = "الخميس";

if(today != specialSalesDay){
   console.log("اليوم ليس يوم تخفيضات");
}`,

    answers: [
        "لا يوجد إخراج",
        "اليوم ليس يوم تخفيضات",
        "اليوم يوم تخفيضات",
        "تخفيضات فقط"
    ]
},

{
    question: "ما ناتج العملية التالية ؟",

    code:
`let x = 5;
let y = 3;

console.log(x + y);`,

    answers: [
        "53",
        "8",
        "15",
        "خطأ"
    ]
},

{
    question: "ما نوع المتغير التالي ؟",

    code:
`let name = "Mostafa";`,

    answers: [
        "Number",
        "Boolean",
        "String",
        "Array"
    ]
},

{
    question: "حدد البرنامج الذي يقوم بإخراج: لا يمكنك الركوب",

    code:
`let height = 180;
let weight = 110;

if ((height >= 100) && (weight <= 100)) {
   console.log("يمكنك الركوب");
} else {
   console.log("لا يمكنك الركوب");
}`,

    answers: [
        "يمكنك الركوب",
        "لا يمكنك الركوب",
        "لا يوجد إخراج",
        "خطأ"
    ]
},

{
    question: "حدد ناتج البرنامج التالي",

    code:
`let height = 180;
let weight = 110;

if ((height >= 100) || (weight <= 100)) {
   console.log("يمكنك الركوب");
} else {
   console.log("لا يمكنك الركوب");
}`,

    answers: [
        "يمكنك الركوب",
        "لا يمكنك الركوب",
        "خطأ",
        "لا يوجد إخراج"
    ]
},

{
    question: "حدد ما الذي يقوم البرنامج بإخراجه",

    code:
`let time = 10;
let vehicleNum = "العربة 3";
let destination = "محطة ب";

console.log("هذا القطار متوجه إلى " + destination);

if ((time <= 9) && (vehicleNum == "العربة 3")) {
   console.log("هذه العربة مخصصة لشحن البضائع");
}`,

    answers: [
        "هذا القطار متوجه إلى محطة ب",
        "هذه العربة مخصصة لشحن البضائع",
        "سيتم طباعة الجملتين",
        "لا يوجد إخراج"
    ]
},

{
    question: "ما ناتج البرنامج التالي ؟",

    code:
`let time = 10;
let vehicleNum = "العربة 3";
let destination = "محطة ب";

console.log("هذا القطار متوجه إلى " + destination);

if ((time <= 9) || (vehicleNum == "العربة 3")) {
   console.log("هذه العربة مخصصة لشحن البضائع");
}`,

    answers: [
        "هذا القطار متوجه إلى محطة ب فقط",
        "هذه العربة مخصصة لشحن البضائع فقط",
        "سيتم طباعة الجملتين",
        "لا يوجد إخراج"
    ]
}

];

let current = 0;

/* إنشاء قائمة الأسئلة تلقائياً */

const questionsList =
document.getElementById("questionsList");

questions.forEach((q,index)=>{

    questionsList.innerHTML += `
    <div class="question-item ${index === 0 ? "active" : ""}"
    onclick="loadQuestion(${index},this)">
        السؤال ${index + 1}
    </div>
    `;

});

function loadQuestion(index, element){

    current = index;

    document.getElementById("currentQuestion").innerText =
    index + 1;

    document.getElementById("questionText").innerText =
    questions[index].question;

    document.getElementById("codeBox").innerText =
    questions[index].code;

    let answersHTML = "";

    questions[index].answers.forEach(answer => {

        answersHTML += `
        <div class="answer"
        onclick="selectAnswer(this)">
            ${answer}
        </div>
        `;

    });

    document.getElementById("answersBox").innerHTML =
    answersHTML;

    document.querySelectorAll(".question-item")
    .forEach(q => q.classList.remove("active"));

    element.classList.add("active");
}

function selectAnswer(el){

    document.querySelectorAll(".answer")
    .forEach(a => a.classList.remove("selected"));

    el.classList.add("selected");

}

function nextQuestion(){

    if(current < questions.length - 1){

        current++;

        const items =
        document.querySelectorAll(".question-item");

        loadQuestion(current, items[current]);

    }

}

function finishExam(){

    alert("تم إنهاء الاختبار");

}

/* مؤقت */

let seconds = 1800;

setInterval(()=>{

    let min = Math.floor(seconds / 60);
    let sec = seconds % 60;

    sec = sec < 10 ? "0"+sec : sec;

    document.getElementById("timer").innerText =
    `${min}:${sec}`;

    if(seconds > 0){
        seconds--;
    }

},1000);


/* تحميل أول سؤال */
loadQuestion(
    0,
    document.querySelector(".question-item")
);

</script>

</body>
    </html>
