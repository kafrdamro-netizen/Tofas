<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الاختبار المحدثة - بنظام الدرجات</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial;
}

body{
    background:#f2f4f8;
}

/* الشريط العلوي */
.topbar{
    background:#0b2347;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.topbar .title{
    font-size:24px;
    font-weight:bold;
}

.topbar .info{
    display:flex;
    gap:15px;
    align-items:center;
    flex-wrap:wrap;
}

.btn{
    background:#1f4fa3;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.btn-finish {
    background: #d9534f;
}

.btn:hover{
    opacity:0.9;
}

/* تقسيم الصفحة */
.container{
    display:flex;
    height:calc(100vh - 80px);
}

/* قائمة الأسئلة */
.sidebar{
    width:25%;
    background:#ffffff;
    padding:20px;
    overflow-y:auto;
    border-left:2px solid #ddd;
}

.sidebar h2{
    margin-bottom:20px;
    font-size: 1.2rem;
}

.question-item{
    background:#f7f7f7;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
    display: flex;
    justify-content: space-between;
}

.question-item.answered {
    background: #e8f5e9;
    border-color: #4caf50;
}

.question-item.active{
    border-color:#1f4fa3;
    background:#e6edff;
}

/* منطقة السؤال */
.content{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

.question-box{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 0 15px rgba(0,0,0,0.05);
}

.question-title{
    font-size:20px;
    margin-bottom:20px;
    line-height:1.6;
}

.code-box{
    background:#2d2d2d;
    color: #f8f8f2;
    padding:20px;
    border-radius:10px;
    overflow:auto;
    margin-bottom:20px;
    direction:ltr;
    text-align:left;
    font-family:'Courier New', Courier, monospace;
    border-left:5px solid #1f4fa3;
    white-space:pre-wrap;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.answer{
    background:#f7f7f7;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
    border:2px solid #eee;
    direction:ltr;
    text-align:left;
}

.answer:hover{
    background:#eef3ff;
    border-color: #1f4fa3;
}

.answer.selected{
    border-color:#1f4fa3;
    background:#dfe9ff;
    font-weight: bold;
}

@media(max-width:900px){
    .container{ flex-direction:column; }
    .sidebar{ width:100%; height:150px; border-left:none; border-top:2px solid #ddd; }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="title">اختبار البرمجة الذكي</div>
    <div class="info">
        <span>السؤال: <span id="currentQuestionNum">1</span> / <span id="totalQuestionsNum">0</span></span>
        <span>الوقت: <span id="timer">30:00</span></span>
        <button class="btn" onclick="nextQuestion()">التالي</button>
        <button class="btn btn-finish" onclick="finishExam()">إنهاء الاختبار</button>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <h2>حالة الأسئلة</h2>
        <div id="questionsList"></div>
    </div>

    <div class="content">
        <div id="quizArea" class="question-box">
            <div class="question-title" id="questionText"></div>
            <pre class="code-box" id="codeBox"></pre>
            <div class="answers" id="answersBox"></div>
        </div>
    </div>
</div>

<script>
// مصفوفة الأسئلة مع تحديد الإجابة الصحيحة (المؤشر يبدأ من 0)
const questions = [
    {
        question:"حدد النتيجة التي سيتم إخراجها عند تنفيذ هذا البرنامج",
        code:`let today = "الأربعاء";
let specialSalesDay = "الخميس";
if (today != specialSalesDay) {
  console.log("اليوم ليس يوم تخفيضات");
}`,
        answers:["لا يوجد إخراج", "اليوم ليس يوم تخفيضات", "اليوم يوم تخفيضات", "يوم تخفيضات"],
        correct: 1
    },
    {
        question:"حدد البرنامج الذي يقوم بإخراج: لا يمكنك الركوب",
        code:"",
        answers:[
`let height = 180; let weight = 110;
if ((height >= 100) || (weight <= 100)) { console.log("يمكنك الركوب"); } 
else { console.log("لا يمكنك الركوب"); }`,
`let height = 180; let weight = 110;
if ((height >= 100) && (weight <= 100)) { console.log("يمكنك الركوب"); } 
else { console.log("لا يمكنك الركوب"); }`,
`let height = 180; let weight = 110;
if ((height < 100) || (weight > 100)) { console.log("يمكنك الركوب"); } 
else { console.log("لا يمكنك الركوب"); }`,
`let height = 180; let weight = 110;
if ((height < 100) && (weight > 100)) { console.log("يمكنك الركوب"); } 
else { console.log("لا يمكنك الركوب"); }`
        ],
        correct: 1
    },
    {
        question: "حدد البرنامج الذي يقوم بإخراج: حاصل الجمع هو 15",
        code: "",
        answers: [
`let x = "10"; let y = 5;
console.log("حاصل الجمع هو " + (x + y));`,
`let x = 10; let y = 5;
console.log("حاصل الجمع هو " + x + y);`,
`let x = 10; let y = 5;
console.log("حاصل الجمع هو " + (x + y));`,
`let x = 10; let y = 5;
if (x = y) { console.log("حاصل الجمع هو 15"); }`
        ],
        correct: 2
    },
    {
        question: "ما هي القيمة التي ستظهر في القنصل بعد تنفيذ الكود التالي؟",
        code: `let colors = ["أحمر", "أخضر", "أزرق"];
colors.push("أصفر");
console.log(colors.length);`,
        answers: ["2", "3", "4", "أصفر"],
        correct: 2
    },
    {
        question: "أي من البرامج التالية يقوم بطباعة الأرقام من 1 إلى 3؟",
        code: "",
        answers: [
`for (let i = 1; i <= 3; i++) {
  console.log(i);
}`,
`for (let i = 1; i < 3; i++) {
  console.log(i);
}`,
`let i = 1;
if (i <= 3) {
  console.log(i);
}`,
`for (let i = 3; i > 0; i--) {
  console.log(i);
}`
        ],
        correct: 0
    }
    // يمكنك إضافة بقية الأسئلة هنا بنفس النمط
];

let current = 0;
let userAnswers = new Array(questions.length).fill(null); // لتخزين إجابات المستخدم

function renderSidebar(){
    const list = document.getElementById("questionsList");
    list.innerHTML = "";
    questions.forEach((q, index) => {
        const item = document.createElement("div");
        item.className = `question-item ${index === current ? "active" : ""} ${userAnswers[index] !== null ? "answered" : ""}`;
        item.innerHTML = `<span>سؤال ${index + 1}</span> ${userAnswers[index] !== null ? '✓' : ''}`;
        item.onclick = () => loadQuestion(index);
        list.appendChild(item);
    });
}

function loadQuestion(index){
    current = index;
    document.getElementById("currentQuestionNum").innerText = index + 1;
    document.getElementById("totalQuestionsNum").innerText = questions.length;
    document.getElementById("questionText").innerText = questions[index].question;
    
    const codeBox = document.getElementById("codeBox");
    if(questions[index].code) {
        codeBox.innerText = questions[index].code;
        codeBox.style.display = "block";
    } else {
        codeBox.style.display = "none";
    }

    const answersBox = document.getElementById("answersBox");
    answersBox.innerHTML = "";

    questions[index].answers.forEach((answer, i) => {
        const div = document.createElement("div");
        div.className = `answer ${userAnswers[current] === i ? "selected" : ""}`;
        div.innerText = answer;
        div.onclick = function(){
            userAnswers[current] = i;
            loadQuestion(current); // إعادة التحميل لتحديث حالة الاختيار
        };
        answersBox.appendChild(div);
    });
    renderSidebar();
}

function nextQuestion(){
    if(current < questions.length - 1) loadQuestion(current + 1);
    else alert("هذا هو السؤال الأخير.");
}

function finishExam(){
    if(confirm("هل أنت متأكد من إنهاء الاختبار؟")){
        let score = 0;
        userAnswers.forEach((ans, index) => {
            if(ans === questions[index].correct) score++;
        });

        const quizArea = document.getElementById("quizArea");
        quizArea.innerHTML = `
            <div style="text-align:center; padding: 40px;">
                <h1 style="color:#1f4fa3; font-size:48px;">النتيجة النهائية</h1>
                <p style="font-size:24px; margin:20px 0;">لقد حصلت على <strong>${score}</strong> من <strong>${questions.length}</strong></p>
                <div style="font-size:60px;">${(score/questions.length >= 0.5) ? '🥳' : '😐'}</div>
                <button class="btn" style="margin-top:30px;" onclick="location.reload()">إعادة الاختبار</button>
            </div>
        `;
        // إيقاف المؤقت
        clearInterval(timerInterval);
    }
}

// نظام الوقت
let seconds = 1800;
const timerInterval = setInterval(()=>{
    let min = Math.floor(seconds / 60);
    let sec = seconds % 60;
    document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
    if(seconds <= 0) {
        clearInterval(timerInterval);
        alert("انتهى الوقت!");
        finishExam();
    }
    seconds--;
},1000);

loadQuestion(0);
</script>

</body>
</html>
