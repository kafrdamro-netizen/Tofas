<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الاختبار المحدثة</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial;
}

body{
    background:#f2f4f8;
}

/* الشريط العلوي */
.topbar{
    background:#0b2347;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.topbar .title{
    font-size:24px;
    font-weight:bold;
}

.topbar .info{
    display:flex;
    gap:15px;
    align-items:center;
}

.btn{
    background:#1f4fa3;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    opacity:0.9;
}

/* تقسيم الصفحة */
.container{
    display:flex;
    height:calc(100vh - 80px);
}

/* قائمة الأسئلة */
.sidebar{
    width:30%;
    background:#ffffff;
    padding:20px;
    overflow-y:auto;
    border-left:2px solid #ddd;
}

.sidebar h2{
    margin-bottom:20px;
}

.question-item{
    background:#f7f7f7;
    padding:15px;
    margin-bottom:10px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
}

.question-item:hover{
    background:#e9eefc;
}

.question-item.active{
    border-color:#1f4fa3;
    background:#e6edff;
}

/* منطقة السؤال */
.content{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

.question-box{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.question-title{
    font-size:22px;
    margin-bottom:20px;
    line-height: 1.5;
}

.code-box{
    background:#f4f4f4;
    padding:20px;
    border-radius:10px;
    overflow:auto;
    margin-bottom:20px;
    direction:ltr;
    text-align:left;
    font-family: 'Courier New', Courier, monospace;
    border-left: 5px solid #1f4fa3;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.answer{
    background:#f7f7f7;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
    direction: ltr;
    text-align: left;
}

.answer:hover{
    background:#eef3ff;
}

.answer.selected{
    border-color:#1f4fa3;
    background:#dfe9ff;
}

/* موبايل */
@media(max-width:900px){
    .container{ flex-direction:column; }
    .sidebar{ width:100%; height:200px; border-left:none; border-top:2px solid #ddd; }
}
</style>

</head>
<body>

<div class="topbar">
    <div class="title">منصة الاختبار الذكية</div>
    <div class="info">
        <span>السؤال: <span id="currentQuestion">1</span></span>
        <span>الوقت: <span id="timer">30:00</span></span>
        <button class="btn" onclick="nextQuestion()">التالي</button>
        <button class="btn" onclick="finishExam()">إنهاء</button>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <h2>قائمة الأسئلة</h2>
        <div id="questionsList"></div>
    </div>

    <div class="content">
        <div class="question-box">
            <div class="question-title" id="questionText"></div>
            <pre class="code-box" id="codeBox"></pre>
            <div class="answers" id="answersBox"></div>
        </div>
    </div>
</div>

<script>

const questions = [
    // الأسئلة السابقة
    {
        question: "حدد النتيجة التي سيتم إخراجها عند تنفيذ هذا البرنامج",
        code: `let today = "الأربعاء";\nlet specialSalesDay = "الخميس";\n\nif(today != specialSalesDay){\n   console.log("اليوم ليس يوم تخفيضات");\n}`,
        answers: ["لا يوجد إخراج", "اليوم ليس يوم تخفيضات", "اليوم يوم تخفيضات", "تخفيضات فقط"]
    },
    {
        question: "ما ناتج العملية التالية ؟",
        code: `let x = 5;\nlet y = 3;\n\nconsole.log(x + y);`,
        answers: ["53", "8", "15", "خطأ"]
    },
    // سؤال المصفوفات (من الرد السابق)
    {
        question: "حدد البرنامج الذي يقوم بإخراج: لدي محفظة",
        code: `let itemList = ["ساعة يد", "هاتف ذكي", "محفظة"];`,
        answers: [
            "console.log(\"لدي \" + itemList[1]);",
            "console.log(\"لدي \" + itemList[2]);",
            "console.log(\"لدي \" + itemList);",
            "console.log(\"لدي \" + itemList[3]);"
        ]
    },
    // السؤال 16 من الصور الجديدة
    {
        question: "حدد البرنامج الذي يقوم بإخراج ما يلي:\nلون التفاح أحمر\nلون الفراولة أحمر",
        code: `let fruits = ["التفاح", "الفراولة", "البرتقال"];\nlet nonRedFruit = "البرتقال";`,
        answers: [
            "for (let i=0; i<fruits.length; i++) {\n if (fruits[i] == nonRedFruit) { ... } \n}",
            "for (let i=0; i<fruits.length; i++) {\n if (fruits[i] != nonRedFruit) {\n  console.log(\"أحمر \" + fruits[i] + \" لون\");\n }\n}",
            "for (let i=0; i<fruits.length; i++) {\n if (fruits == nonRedFruit) { ... } \n}",
            "if (fruits[i] !== nonRedFruit) { ... }"
        ]
    },
    // السؤال 17
    {
        question: "حدد البرنامج الذي يقوم بإخراج التحقق من الدول الأفريقية كما بالصورة:",
        code: `let countries = ["كينيا", "البرازيل", "مصر", "أستراليا"];\nlet africanCountries = ["كينيا", "مصر"];`,
        answers: [
            "if ((countries[i] == africanCountries[0]) || (countries[i] == africanCountries[1]))",
            "if ((countries[i] == africanCountries[0]) && (countries[i] == africanCountries[1]))",
            "if (countries == africanCountries)",
            "if (countries[i] != africanCountries)"
        ]
    },
    // السؤال 18
    {
        question: "حدد البرنامج الذي يقوم بطباعة قائمة الطعام اليوم (بدون السوشي):",
        code: `let menu = ["برغر الدجاج", "سوشي", "رامن", "باستا"];`,
        answers: [
            "if (menu == \"سوشي\") { ... }",
            "if (!(menu[i] == \"سوشي\")) {\n  console.log(menu[i]);\n}",
            "if (menu[i] == \"سوشي\") { ... }",
            "console.log(menu);"
        ]
    },
    // السؤال 20
    {
        question: "حدد البرنامج الذي يطبع تنبيه الحصة الرياضية في حال كان الطقس ماطراً:",
        code: `let timetable = ["اللغة اليابانية", "العلوم", "الدراسات"];\nlet tomorrowWeather = "ماطراً";`,
        answers: [
            "if ((tomorrowWeather == \"ماطراً\") && (timetable[i] == \"التربية البدنية\"))",
            "if ((tomorrowWeather == \"ماطراً\") || (timetable[i] == \"التربية البدنية\"))",
            "if (tomorrowWeather == \"ماطراً\")",
            "if (timetable[i] == \"التربية البدنية\")"
        ]
    },
    // السؤال 21
    {
        question: "حدد البرنامج الذي يقوم بإخراج: تم قبول الحجز (إذا كان الضيوف أقل من 7 والمطعم مفتوح):",
        code: `let guests = ["يومي", "ميكا", "ماي"];\nlet restaurantStatus = "مفتوح";`,
        answers: [
            "if ((guests.length > 7) || (restaurantStatus == \"مفتوح\"))",
            "if ((guests.length < 7) && (restaurantStatus == \"مفتوح\"))",
            "if (guests.length < 7)",
            "if (restaurantStatus == \"مفتوح\")"
        ]
    },
    // السؤال 23
    {
        question: "حدد البرنامج الذي يطبع 'انتهت حصة...' لجميع حصص الجدول الدراسي:",
        code: `let timetable = ["العلوم", "الرياضيات", "الدراسات"];`,
        answers: [
            "for (let i = 0; i < timetable.length; i++) {\n  console.log(\"انتهت حصة\" + timetable[i]);\n}",
            "if (let i = 0; i < timetable.length; i++)",
            "console.log(timetable);",
            "for (let i = 1; i <= 3; i++)"
        ]
    },
    // السؤال 24
    {
        question: "حدد البرنامج الذي يضيف رسوم إضافية لـ 'شوربة البصل' أو 'السلطات':",
        code: `let mealList = ["خبز", "سلطات", "ستيك", "شوربة البصل"];`,
        answers: [
            "if ((mealList[i] == \"شوربة البصل\") && (mealList[i] == \"سلطات\"))",
            "if ((mealList[i] == \"شوربة البصل\") || (mealList[i] == \"سلطات\"))",
            "if (mealList == \"سلطات\")",
            "console.log(mealList[i]);"
        ]
    },
    // السؤال 25
    {
        question: "حدد البرنامج الذي يطبع 'اشتريت جهازاً لوحياً' إذا كان متوفراً والميزانية تسمح:",
        code: `let electronicDevices = ["حاسوب", "جهاز لوحي", "شاشة"];\nlet wantedDevice = "جهاز لوحي";\nlet walletAmount = 50000;`,
        answers: [
            "if ((electronicDevices[i] == wantedDevice) && (walletAmount >= 30000))",
            "if ((electronicDevices[i] == wantedDevice) || (walletAmount >= 30000))",
            "if (electronicDevices == wantedDevice)",
            "if (walletAmount > 30000)"
        ]
    }
];

let current = 0;
const questionsList = document.getElementById("questionsList");

function renderSidebar() {
    questionsList.innerHTML = "";
    questions.forEach((q, index) => {
        const item = document.createElement("div");
        item.className = `question-item ${index === current ? "active" : ""}`;
        item.innerText = `السؤال ${index + 1}`;
        item.onclick = () => loadQuestion(index);
        questionsList.appendChild(item);
    });
}

function loadQuestion(index) {
    current = index;
    document.getElementById("currentQuestion").innerText = index + 1;
    document.getElementById("questionText").innerText = questions[index].question;
    document.getElementById("codeBox").innerText = questions[index].code;

    const answersBox = document.getElementById("answersBox");
    answersBox.innerHTML = "";

    questions[index].answers.forEach(answer => {
        const div = document.createElement("div");
        div.className = "answer";
        div.innerText = answer;
        div.onclick = function() {
            document.querySelectorAll(".answer").forEach(a => a.classList.remove("selected"));
            this.classList.add("selected");
        };
        answersBox.appendChild(div);
    });

    renderSidebar();
}

function nextQuestion() {
    if (current < questions.length - 1) {
        loadQuestion(current + 1);
    } else {
        alert("وصلت إلى آخر سؤال");
    }
}

function finishExam() {
    alert("تم إنهاء الاختبار بنجاح!");
}

// المؤقت
let seconds = 1800;
setInterval(() => {
    let min = Math.floor(seconds / 60);
    let sec = seconds % 60;
    document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0' + sec : sec}`;
    if (seconds > 0) seconds--;
}, 1000);

// التشغيل الأول
loadQuestion(0);

</script>
</body>
</html>
