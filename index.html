<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الاختبار المحدثة</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma, Arial;
}

body{
    background:#f2f4f8;
}

/* الشريط العلوي */
.topbar{
    background:#0b2347;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.topbar .title{
    font-size:24px;
    font-weight:bold;
}

.topbar .info{
    display:flex;
    gap:15px;
    align-items:center;
    flex-wrap:wrap;
}

.btn{
    background:#1f4fa3;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    opacity:0.9;
}

/* تقسيم الصفحة */
.container{
    display:flex;
    height:calc(100vh - 80px);
}

/* قائمة الأسئلة */
.sidebar{
    width:30%;
    background:#ffffff;
    padding:20px;
    overflow-y:auto;
    border-left:2px solid #ddd;
}

.sidebar h2{
    margin-bottom:20px;
}

.question-item{
    background:#f7f7f7;
    padding:15px;
    margin-bottom:10px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
}

.question-item:hover{
    background:#e9eefc;
}

.question-item.active{
    border-color:#1f4fa3;
    background:#e6edff;
}

/* منطقة السؤال */
.content{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

.question-box{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.question-title{
    font-size:22px;
    margin-bottom:20px;
    line-height:1.8;
}

.code-box{
    background:#f4f4f4;
    padding:20px;
    border-radius:10px;
    overflow:auto;
    margin-bottom:20px;
    direction:ltr;
    text-align:left;
    font-family:'Courier New', Courier, monospace;
    border-left:5px solid #1f4fa3;
    white-space:pre-wrap;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.answer{
    background:#f7f7f7;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
    direction:ltr;
    text-align:left;
    white-space:pre-wrap;
}

.answer:hover{
    background:#eef3ff;
}

.answer.selected{
    border-color:#1f4fa3;
    background:#dfe9ff;
}

@media(max-width:900px){
    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:200px;
        border-left:none;
        border-top:2px solid #ddd;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="title">منصة الاختبار الذكية</div>

    <div class="info">
        <span>السؤال: <span id="currentQuestion">1</span></span>
        <span>الوقت: <span id="timer">30:00</span></span>

        <button class="btn" onclick="nextQuestion()">التالي</button>
        <button class="btn" onclick="finishExam()">إنهاء</button>
    </div>
</div>

<div class="container">

    <div class="sidebar">
        <h2>قائمة الأسئلة</h2>
        <div id="questionsList"></div>
    </div>

    <div class="content">
        <div class="question-box">

            <div class="question-title" id="questionText"></div>

            <pre class="code-box" id="codeBox"></pre>

            <div class="answers" id="answersBox"></div>

        </div>
    </div>

</div>

let current = 0;

const questionsList = document.getElementById("questionsList");

function renderSidebar(){

    questionsList.innerHTML = "";

    questions.forEach((q,index)=>{

        const item = document.createElement("div");

        item.className = `question-item ${index === current ? "active" : ""}`;

        item.innerText = `السؤال ${index + 1}`;

        item.onclick = ()=> loadQuestion(index);

        questionsList.appendChild(item);

    });

}

function loadQuestion(index){

    current = index;

    document.getElementById("currentQuestion").innerText = index + 1;

    document.getElementById("questionText").innerText = questions[index].question;

    document.getElementById("codeBox").innerText = questions[index].code;

    const answersBox = document.getElementById("answersBox");

    answersBox.innerHTML = "";

    questions[index].answers.forEach(answer=>{

        const div = document.createElement("div");

        div.className = "answer";

        div.innerText = answer;

        div.onclick = function(){

            document.querySelectorAll(".answer").forEach(a=>{
                a.classList.remove("selected");
            });

            this.classList.add("selected");

        };

        answersBox.appendChild(div);

    });

    renderSidebar();

}

function nextQuestion(){

    if(current < questions.length - 1){

        loadQuestion(current + 1);

    }else{

        alert("وصلت إلى آخر سؤال");

    }

}

function finishExam(){

    alert("تم إنهاء الاختبار بنجاح!");

}

let seconds = 1800;

setInterval(()=>{

    let min = Math.floor(seconds / 60);

    let sec = seconds % 60;

    document.getElementById("timer").innerText =
    `${min}:${sec < 10 ? '0'+sec : sec}`;

    if(seconds > 0){
        seconds--;
    }

},1000);

loadQuestion(0);
