<script>

const questions = [

{
    question: "حدد النتيجة التي سيتم إخراجها عند تنفيذ هذا البرنامج",

    code:
`let today = "الأربعاء";
let specialSalesDay = "الخميس";

if(today != specialSalesDay){
   console.log("اليوم ليس يوم تخفيضات");
}`,

    answers: [
        "لا يوجد إخراج",
        "اليوم ليس يوم تخفيضات",
        "اليوم يوم تخفيضات",
        "تخفيضات فقط"
    ]
},

{
    question: "حدد البرنامج الذي يقوم بإخراج ما يلي:",

    code: `لا يمكنك الركوب`,

    answers: [

`let height = 180;
let weight = 110;

if ((height >= 100) || (weight <= 100)) {
   console.log("يمكنك الركوب");
} else {
   console.log("لا يمكنك الركوب");
}`,

`let height = 180;
let weight = 110;

if ((height >= 100) && (weight <= 100)) {
   console.log("يمكنك الركوب");
} else {
   console.log("لا يمكنك الركوب");
}`,

`let height = 180;
let weight = 110;

if ((height < 100) && (weight <= 100)) {
   console.log("يمكنك الركوب");
} else {
   console.log("لا يمكنك الركوب");
}`,

`let height = 180;
let weight = 110;

if ((height < 100) || (weight < 100)) {
   console.log("يمكنك الركوب");
} else {
   console.log("لا يمكنك الركوب");
}`

    ]
}

];

let current = 0;

function loadQuestion(index, element){

    current = index;

    document.getElementById("currentQuestion").innerText = index + 1;

    document.getElementById("questionText").innerText =
    questions[index].question;

    document.getElementById("codeBox").innerText =
    questions[index].code;

    let answersHTML = "";

    questions[index].answers.forEach(answer => {

        answersHTML += `
        <div class="answer" onclick="selectAnswer(this)">
            <pre>${answer}</pre>
        </div>
        `;

    });

    document.getElementById("answersBox").innerHTML =
    answersHTML;

    document.querySelectorAll(".question-item")
    .forEach(q => q.classList.remove("active"));

    if(element){
        element.classList.add("active");
    }

}

function selectAnswer(el){

    document.querySelectorAll(".answer")
    .forEach(a => a.classList.remove("selected"));

    el.classList.add("selected");

}

function nextQuestion(){

    if(current < questions.length - 1){

        current++;

        const items =
        document.querySelectorAll(".question-item");

        loadQuestion(current, items[current]);

    }

}

function finishExam(){

    alert("تم إنهاء الاختبار");

}

/* المؤقت */

let seconds = 1800;

setInterval(() => {

    let min = Math.floor(seconds / 60);
    let sec = seconds % 60;

    sec = sec < 10 ? "0" + sec : sec;

    document.getElementById("timer").innerText =
    `${min}:${sec}`;

    if(seconds > 0){
        seconds--;
    }

}, 1000);


/* تحميل أول سؤال */

window.onload = function(){

    loadQuestion(
        0,
        document.querySelector(".question-item")
    );

};

</script>

</body>
</html>
