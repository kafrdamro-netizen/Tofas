        question: "سؤال 25: حدد البرنامج الذي يطبع 'اشتريت جهازًا لوحيًا' عند مطابقة النوع وتوفر الميزانية:",
        answers: [
            "let devices = ['شاشة', 'جهازًا لوحيًا', 'حاسوب']; let wanted = 'جهازًا لوحيًا'; let wall = 50000; let price = 30000; for (let i=0; i<devices.length; i++) { if ((devices[i] == wanted) && (wall >= price)) { console.log('اشتريت ' + wanted); } }",
            "let devices = ['شاشة', 'جهازًا لوحيًا', 'حاسوب']; let wanted = 'جهازًا لوحيًا'; let wall = 50000; let price = 30000; for (let i=0; i<devices.length; i++) { if ((devices[i] == wanted) || (wall >= price)) { console.log('اشتريت ' + wanted); } }",
            "let devices = ['شاشة', 'جهازًا لوحيًا', 'حاسوب']; let wanted = 'جهازًا لوحيًا'; if (wanted == devices) { console.log('اشتريت'); }"
        ],
        correct: 0
    }
];

let current = 0;
let userAnswers = new Array(questions.length).fill(null);

function renderSidebar(){
    const list = document.getElementById("questionsList");
    list.innerHTML = "";
    questions.forEach((q, index) => {
        const item = document.createElement("div");
        item.className = `question-item ${index === current ? "active" : ""} ${userAnswers[index] !== null ? "answered" : ""}`;
        item.innerHTML = `<span>سؤال ${index + 1}</span> ${userAnswers[index] !== null ? '✓' : ''}`;
        item.onclick = () => loadQuestion(index);
        list.appendChild(item);
    });
}

function loadQuestion(index){
    current = index;
    const q = questions[index];
    
    document.getElementById("currentQuestionNum").innerText = index + 1;
    document.getElementById("totalQuestionsNum").innerText = questions.length;
    document.getElementById("questionText").innerText = q.question;
    
    const noteArea = document.getElementById("noteArea");
    if(q.note) {
        noteArea.innerHTML = `<div class="note-box"><strong>ملاحظة:</strong> ${q.note}</div>`;
    } else {
        noteArea.innerHTML = "";
    }

    const codeBox = document.getElementById("codeBox");
    if(q.code) {
        codeBox.innerText = q.code;
        codeBox.style.display = "block";
    } else {
        codeBox.style.display = "none";
    }

    const answersBox = document.getElementById("answersBox");
    answersBox.innerHTML = "";

    q.answers.forEach((ans, i) => {
        const div = document.createElement("div");
        div.className = `answer ${userAnswers[current] === i ? "selected" : ""}`;
        div.innerText = ans;
        div.onclick = function(){
            userAnswers[current] = i;
            loadQuestion(current);
        };
        answersBox.appendChild(div);
    });
    renderSidebar();
}

function nextQuestion(){
    if(current < questions.length - 1) loadQuestion(current + 1);
    else alert("لقد وصلت لنهاية الأسئلة، اضغط 'إنهاء' لرؤية النتيجة.");
}

function finishExam(){
    let unanswered = userAnswers.filter(a => a === null).length;
    let msg = unanswered > 0 ? `لديك ${unanswered} سؤال لم تجب عليه. هل تريد الإنهاء؟` : "هل أنت متأكد من إنهاء الاختبار؟";
    
    if(confirm(msg)){
        let score = 0;
        userAnswers.forEach((ans, index) => {
            if(ans === questions[index].correct) score++;
        });

        const quizArea = document.getElementById("quizArea");
        const percent = Math.round((score/questions.length)*100);
        
        quizArea.innerHTML = `
            <div style="text-align:center; padding: 40px;">
                <h1 style="color:#1f4fa3; font-size:36px;">انتهى الاختبار</h1>
                <div style="font-size:80px; margin:20px 0;">${percent >= 50 ? '🏆' : '📚'}</div>
                <p style="font-size:24px;">نتيجتك هي: <strong>${score}</strong> من <strong>${questions.length}</strong></p>
                <p style="font-size:20px; color:#666;">النسبة المئوية: ${percent}%</p>
                <button class="btn" style="margin-top:30px; padding:15px 40px;" onclick="location.reload()">إعادة المحاولة</button>
            </div>
        `;
        clearInterval(timerInterval);
    }
}

let seconds = 1800;
const timerInterval = setInterval(()=>{
    let min = Math.floor(seconds / 60);
    let sec = seconds % 60;
    document.getElementById("timer").innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
    if(seconds <= 0) {
        clearInterval(timerInterval);
        finishExam();
    }
    seconds--;
},1000);

loadQuestion(0);
</script>

</body>
</html>
